services:
  backend:
    build: ./kittygram_backend
    expose:
      - "8000"
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media

  frontend:
    build: ./kittygram_frontend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/var/www/static
    depends_on:
      - backend
      - frontend

volumes:
  static_volume:
  media_volume: